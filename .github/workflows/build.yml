name: Build and Push
on:
  push:
    branches:
      - master
  schedule:
    # Every Monday at 04:00 UTC — picks up Alpine base image security patches
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read major.minor from VERSION file
          base=$(cat VERSION | tr -d '[:space:]')

          # Find the latest release matching this major.minor prefix
          prefix="${base}."
          last=$(gh release list --json tagName -q \
            "[.[] | select(.tagName | startswith(\"${prefix}\"))][0].tagName // empty")

          if [ -z "$last" ]; then
            patch=0
          else
            patch=$(( ${last##*.} + 1 ))
          fi

          tag="${prefix}${patch}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "→ Next version: ${tag}"

          # Extract Alpine version for metadata
          alpine=$(grep '^FROM alpine:' Dockerfile | cut -d: -f2)
          echo "alpine=${alpine}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=${{ steps.version.outputs.base }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.tag }}
          body: |
            ## Docker Image

            ```
            docker pull ghcr.io/therealbithive/nfs-server-alpine:${{ steps.version.outputs.tag }}
            docker pull ghcr.io/therealbithive/nfs-server-alpine:${{ steps.version.outputs.base }}
            docker pull ghcr.io/therealbithive/nfs-server-alpine:latest
            ```

            ### Details

            - **Trigger:** ${{ github.event_name == 'schedule' && 'Weekly security rebuild' || github.event_name == 'workflow_dispatch' && 'Manual trigger' || 'Code change' }}
            - **Alpine base:** `${{ steps.version.outputs.alpine }}`
            - **Platforms:** `linux/amd64` · `linux/arm64` · `linux/arm/v7`

            ${{ github.event_name == 'push' && format('### Changes\n\n{0}', github.event.head_commit.message) || '' }}
          make_latest: true
