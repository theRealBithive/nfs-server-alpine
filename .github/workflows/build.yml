name: Build and Push

on:
  push:
    branches:
      - master
  schedule:
    # Every Monday at 04:00 UTC — picks up Alpine base image security patches
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYY-MM-DD'}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release tag
        id: tag
        run: |
          DATE=$(date +'%Y.%m.%d')
          SHA=$(git rev-parse --short HEAD)
          echo "value=v${DATE}-${SHA}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          body: |
            ## Docker Image

            ```
            docker pull ghcr.io/therealbithive/nfs-server-alpine:latest
            ```

            ### Changes
            ${{ github.event_name == 'schedule' && 'Scheduled weekly rebuild — picks up latest Alpine security patches.' || github.event.head_commit.message }}

            ### Image tags
            `latest` · `sha-${{ github.sha }}` (short: `sha-${{ steps.tag.outputs.value }}`)

            Platforms: `linux/amd64` · `linux/arm64` · `linux/arm/v7`
          make_latest: true
